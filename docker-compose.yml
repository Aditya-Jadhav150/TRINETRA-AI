services:
  postgres:
    image: postgres:16-alpine
    container_name: trinetra_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: trinetra_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.18-community
    container_name: trinetra_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs

  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: trinetra_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: trinetra_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinetra_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/trinetra_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=trinetrasupersecretkeyforjwttokenauth
      - JWT_REFRESH_SECRET=trinetrasupersecretrefreshkeyforauth
      - APP_MODE=development
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - qdrant
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: trinetra_frontend
    restart: always
    environment:
      - VITE_BACKEND_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
  qdrantdata:
  redisdata:
